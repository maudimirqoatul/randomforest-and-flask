<!DOCTYPE html>
<html >
<!--From https://codepen.io/frytyler/pen/EGdtg-->
<head>
  <meta charset="UTF-8">
  <title>Airbnb Price Prediction</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Hind:300' rel='stylesheet' type='text/css'>
<link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300' rel='stylesheet' type='text/css'>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  
</head>

<body>
 <div class="login">
	<h1>Airbnb Price Prediction</h1>

     <!-- Main Input For Receiving Query to our ML -->
    <form action="{{ url_for('predict')}}"method="post">
    	<input type="text" name="neighbourhood_cleansed" placeholder="neighbourhood cleansed" required="required" />
        <input type="text" name="property_type" placeholder="property type" required="required" />
		<input type="text" name="room_type" placeholder="room type" required="required" />
		<input type="text" name="accommodates" placeholder="accommodates" required="required" />
		<input type="text" name="bathrooms" placeholder="bathrooms" required="required" />
		<input type="text" name="bedrooms" placeholder="bedrooms" required="required" />
		<input type="text" name="beds" placeholder="beds" required="required" />
		<input type="text" name="cleaning_fee" placeholder="cleaning fee" required="required" />
		<input type="text" name="bed_type" placeholder="bed type" required="required" />
		<input type="text" name="guests_included" placeholder="guests included" required="required" />
		<input type="text" name="extra_people" placeholder="extra people" required="required" />
		<input type="text" name="minimum_nights" placeholder="minimum nights" required="required" />
		<input type="text" name="amen_score" placeholder="amen score" required="required" />

        <button type="submit" class="btn btn-primary btn-block btn-large">Predict</button>
    </form>

   <br>
   <br>
   {{ prediction_text }}

 </div>


</body>
</html>
